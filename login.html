<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- FrameWork BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<!-- Libreria de Iconos -->
<script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

<!-- FAVICON DE LA APLICACIÓN DE MATRICULA -->
<link rel="shortcut icon" href="img/matricula.ico" type="image/png">

<!-- Hoja de estilos -->
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <article class="container registro contenedor p-3">
    <form id="formLogin" class="formulario formulario--registro mt-4">
        <h2 class="formulario__titulo mb-3">Iniciar Sesión</h2>
        <input class="formulario__input" type="text" id="logUsuario" placeholder="N° DNI o Usuario" required>
        <input class="formulario__input" type="password" id="logPassword" placeholder="Contraseña asignada" required>
        <button class="boton boton--primario" type="submit">Ingresar</button>
        <p id="mensajeLogin" class="mensaje"></p>
    </form>
    </article>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
</body>
</html>
