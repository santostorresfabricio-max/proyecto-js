<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- FrameWork BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<!-- Libreria de Iconos -->
<script src="https://kit.fontawesome.com/812c8ee19a.js" crossorigin="anonymous"></script>

<!-- FAVICON DE LA APLICACIÓN DE MATRICULA -->
<link rel="shortcut icon" href="img/matricula.ico" type="image/png">

<!-- Hoja de estilos -->
<link rel="stylesheet" href="css/estilos.css">

</head>
<body>

    <article class="container p-3 contenedor_registro">
        <form id="formRegistro" class="formulario mt-4">
            <h2 class="mb-3 titulo__formulario">Registro de Nuevo Alumno</h2>
            <input class="input__formulario" type="text" id="regNombres" name="nombres" placeholder="Nombres" required>
            <input class="input__formulario" type="text" id="regApellidos" name="apellidos" placeholder="Apellidos" required>
            <input class="input__formulario" type="text" id="regDni" name="dni" placeholder="N° DNI (8 dígitos)" maxlength="8" required>
            <input class="input__formulario" type="email" id="regCorreo" name="correo" placeholder="Correo Electrónico" required>
            <input class="input__formulario" type="date" id="regNacimiento" name="nacimiento" required>     
            <input class="input__formulario" type="text" id="apoNombres" name="apoNombres" placeholder="Nombres del Apoderado" required>
            <input class="input__formulario" type="text" id="apoCelular" name="apoCelular" placeholder="Celular del Apoderado" maxlength="9" required>
            <button class="btn__formulario" type="submit">Registrarse</button>
            <p id="mensajeRegistro" class="mensaje"></p>
        </form>
        <a class="link__registro" href="login.html" style="text-decoration: none">Ya tengo cuenta / Iniciar Sesión</a>
    </article>
    <script src="js/app.js"></script>

    <!-- Libreria JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
</body>

</html>
